      - z_800
      - z_850
      - z_900
      - z_950
      - z_sfc
      - power
      - capacity
      - turbinecount
      - turbinemask

  training:
    dataset: ${dataloader.dataset.dataset}
    start: "2015-01-01"
    end: "2024-01-31"
    frequency: ${data.frequency}
    drop: []

  validation_rollout: 1

  validation:
    dataset: ${dataloader.dataset.dataset}
    start: "2024-02-01"
    end: "2024-07-31"
    frequency: ${data.frequency}
    drop: []

  test:
    dataset: ${dataloader.dataset.dataset}
    start: "2024-08-01"
    end: "2025-07-31"
    frequency: ${data.frequency}
    drop: []

# ============================================================
# DIAGNOSTICS
# ============================================================
diagnostics:
  plot:
    asynchronous: true
    datashader: true
    frequency:
      batch: 500
      epoch: 2
    parameters: [z_500, t_850, t2m, ws100]
    sample_idx: 0
    precip_and_related_fields: []
    callbacks: []

  callbacks: []

  debug:
    anomaly_detection: false

  profiler: false
  enable_checkpointing: true

  checkpoint:
    every_n_minutes:
      save_frequency: 60
      num_models_saved: 3
    every_n_epochs:
      save_frequency: 1
      num_models_saved: -1
    every_n_train_steps:
      save_frequency: null
      num_models_saved: 0

  log:
    wandb:
      enabled: false
      offline: false
      log_model: false
      project: Anemoi
      entity: "University of Antwerp"
      gradients: false
      parameters: false

    tensorboard:
      enabled: true

    mlflow:
      enabled: false
      offline: false
      authentication: false
      log_model: false
      tracking_uri: "file:${hardware.paths.logs.mlflow}"
      experiment_name: "disabled"
      project_name: "disabled"
      system: true
      terminal: true
      run_name: null
      on_resume_create_child: true
      expand_hyperparams: [config]

    interval: 100

  enable_progress_bar: true
  print_memory_summary: false

# ============================================================
# GRAPH
# ============================================================
graph:
  overwrite: true
  data: data
  hidden: hidden

  nodes:
    data:
      node_builder:
        _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
        dataset:
          cutout:
            - dataset: /mnt/weatherloss/WindPower/data/EGU26/Anemoidatasets/New_Cerra_A_large.zarr
            - dataset: /mnt/weatherloss/WindPower/data/EGU26/Anemoidatasets/era5_A_large.zarr
          min_distance_km: 0
          adjust: all
      attributes:
        area_weight:
          _target_: anemoi.graphs.nodes.attributes.UniformWeights
          norm: unit-max
        cutout:
          _target_: anemoi.graphs.nodes.attributes.CutOutMask
        boundary:
          _target_: anemoi.graphs.nodes.attributes.BooleanNot
          masks:
            _target_: anemoi.graphs.nodes.attributes.CutOutMask
        # turbine_mask:
        #   _target_: anemoi.graphs.nodes.attributes.masks.NonmissingAnemoiDatasetVariable
        #   variable: turbinemask

    hidden:
      node_builder:
        _target_: anemoi.graphs.nodes.LimitedAreaTriNodes
        resolution: 9
        reference_node_name: data
        mask_attr_name: cutout
        margin_radius_km: 300

  edges:
    - source_name: data
      target_name: hidden
      edge_builders:
        - _target_: anemoi.graphs.edges.KNNEdges
          num_nearest_neighbours: 12
          source_mask_attr_name: cutout
        - _target_: anemoi.graphs.edges.CutOffEdges
          cutoff_distance_km: 15
          source_mask_attr_name: boundary
      attributes:
        edge_length:
          _target_: anemoi.graphs.edges.attributes.EdgeLength
          norm: unit-max
        edge_dirs:
          _target_: anemoi.graphs.edges.attributes.EdgeDirection
          norm: unit-std

    - source_name: hidden
      target_name: hidden
      edge_builders:
        - _target_: anemoi.graphs.edges.MultiScaleEdges
          x_hops: 1
          scale_resolutions: 9
      attributes:
        edge_length:
          _target_: anemoi.graphs.edges.attributes.EdgeLength
          norm: unit-max
        edge_dirs:
          _target_: anemoi.graphs.edges.attributes.EdgeDirection
          norm: unit-std

    - source_name: hidden
      target_name: data
      edge_builders:
        - _target_: anemoi.graphs.edges.KNNEdges
          target_mask_attr_name: cutout
          num_nearest_neighbours: 3
      attributes:
        edge_length:
          _target_: anemoi.graphs.edges.attributes.EdgeLength
          norm: unit-max
        edge_dirs:
          _target_: anemoi.graphs.edges.attributes.EdgeDirection
          norm: unit-std

  post_processors:
    - _target_: anemoi.graphs.processors.RestrictEdgeLength
      source_name: data
      target_name: hidden
      max_length_km: 20
      source_mask_attr_name: cutout

    - _target_: anemoi.graphs.processors.RemoveUnconnectedNodes
      nodes_name: data
      save_mask_indices_to_attr: indices_connected_nodes

# ============================================================
# MODEL
# ============================================================
model:
  num_channels: 512
  cpu_offload: false

  model:
    _target_: anemoi.models.models.AnemoiModelEncProcDec

  keep_batch_sharded: true

  layer_kernels:
    LayerNorm:
      _target_: torch.nn.LayerNorm
    Linear:
      _target_: torch.nn.Linear
    Activation:
      _target_: torch.nn.GELU
    QueryNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
    KeyNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false

  processor:
    _target_: anemoi.models.layers.processor.GraphTransformerProcessor
    trainable_size: ${model.trainable_parameters.hidden2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_layers: 8
    num_chunks: 2
    mlp_hidden_ratio: 2
    num_heads: 8
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}

  encoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
    trainable_size: ${model.trainable_parameters.data2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1
    mlp_hidden_ratio: 2
    num_heads: 8
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}

  decoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
    trainable_size: ${model.trainable_parameters.hidden2data}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1
    mlp_hidden_ratio: 2
    num_heads: 8
    initialise_data_extractor_zero: false
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}

  residual:
    _target_: anemoi.models.layers.residual.SkipConnection
    step: -1

  output_mask:
    _target_: anemoi.training.utils.masks.NoOutputMask

  trainable_parameters:
    data: 8
    hidden: 8
    data2hidden: 8
    hidden2data: 8
    hidden2hidden: 8

  attributes:
    edges: [edge_length, edge_dirs]
    nodes: []

  bounding:
    - _target_: anemoi.models.layers.bounding.ReluBounding
      variables: [q_500, q_600, q_700, q_750, q_800, q_850, q_900, q_950, q_1000]


    - _target_: anemoi.models.layers.bounding.HardtanhBounding
      variables:
        - power
      min_val: 0.0
      max_val: 1.0


# ============================================================
# TRAINING
# ============================================================

training:
  run_id: null #VanillaPowerLarge
  fork_run_id: null
  load_weights_only: false
  transfer_learning: null

  deterministic: false
  precision: 16-mixed

  multistep_input: 2
  accum_grad_batches: 1
  num_sanity_val_steps: 6

  gradient_clip:
    val: 32.0
    algorithm: value

  swa:
    enabled: false
    lr: 0.0001

  optimizer:
    _target_: torch.optim.AdamW
    betas: [0.9, 0.95]

  model_task: anemoi.training.train.tasks.GraphForecaster

  strategy:
    _target_: anemoi.training.distributed.strategy.DDPGroupStrategy
    num_gpus_per_model: ${hardware.num_gpus_per_model}
    read_group_size: ${dataloader.read_group_size}

  loss_gradient_scaling: false

  training_loss:
    _target_: anemoi.training.losses.MSELoss
    scalers: ['pressure_level', 'general_variable', 'node_weights', 'nan_mask_weights', 'limited_area_mask']
    ignore_nans: true

  validation_metrics:
    mse:
      _target_: anemoi.training.losses.MSELoss
      scalers: ['node_weights']
      ignore_nans: true

  scalers:
    general_variable:
      _target_: anemoi.training.losses.scalers.GeneralVariableLossScaler
      weights:
        default: 1
        q: 0.6
        t: 6
        u: 0.8
        v: 0.5
        w: 0.001
        z: 12
        mcc: 0.1
        # power: 0.0001


    pressure_level:
      _target_: anemoi.training.losses.scalers.ReluVariableLevelScaler
      group: pl
      y_intercept: 0.2
      slope: 0.001

    nan_mask_weights:
      _target_: anemoi.training.losses.scalers.NaNMaskScaler

    node_weights:
      _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
      nodes_name: ${graph.data}
      nodes_attribute_name: area_weight
      norm: "unit-sum"

    limited_area_mask:
      _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
      nodes_name: ${graph.data}
      nodes_attribute_name: cutout
      norm: null

  variable_groups:
    default: sfc
    pl: [q, t, u, v, z]

  metrics:
    - ws100
    - z_850
    - t_850
    - u_850
    - v_850
    - power

  scale_validation_metrics:
    scalars_to_apply: []
    metrics: []

  rollout:
    start: 1
    epoch_increment: 0
    max: 1

  max_epochs: 20
  max_steps: 200000

  lr:
    warmup: 1000
    rate: 0.0000625 #  global_lr = local_lr * num_gpus_per_node * num_nodes / gpus_per_model
    iterations: ${training.max_steps}
    min: 3.0e-07
  
  # lr:
  #   warmup: 1000
  #   rate: 8.0e-07
  #   iterations: 6000
  #   min: 3.0e-07
  #   warmup_t: 100



  submodules_to_freeze: []