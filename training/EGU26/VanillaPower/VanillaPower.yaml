# GraphTransformerEGU.yaml
# Top-level `system: {hardware, input, output}` with a backward-compat `${hardware.*}` shim.
# Includes Anemoi's LAM scaler preset correctly via Hydra config group.

defaults:
  - _self_

config_validation: false

# ============================================================
# SYSTEM
# ============================================================
system:
  hardware:
    accelerator: gpu
    num_gpus_per_node: 2
    num_nodes: 1
    num_gpus_per_model: 1

  input:
    dataset:
      inner: ${hardware.paths.data}/New_Cerra_A_large.zarr
      outer: ${hardware.paths.data}/era5_A_large.zarr
    graph: /mnt/weatherloss/WindPower/graphs/EGU26/EGUgraph15km.pt
    truncation: null
    truncation_inv: null
    warm_start: null #/mnt/weatherloss/WindPower/training/EGU26/VanillaPower/checkpoint/VanillaPowerLarge/last.ckpt


  output:
    root: /mnt/weatherloss/WindPower/training/EGU26/VanillaPower
    logs:
      root: logs
      wandb: wandb
      mlflow: mlflow
      tensorboard: tensorboard
    checkpoints:
      root: checkpoint
      every_n_epochs: anemoi-by_epoch-epoch_{epoch:03d}-step_{step:06d}
      every_n_train_steps: anemoi-by_step-epoch_{epoch:03d}-step_{step:06d}
      every_n_minutes: anemoi-by_time-epoch_{epoch:03d}-step_{step:06d}
    plots: plots
    profiler: profiler

# ============================================================
# BACKWARD-COMPAT SHIM: keep `${hardware.*}` references working
# ============================================================
hardware:
  accelerator: ${system.hardware.accelerator}
  num_gpus_per_node: ${system.hardware.num_gpus_per_node}
  num_nodes: ${system.hardware.num_nodes}
  num_gpus_per_model: ${system.hardware.num_gpus_per_model}

  paths:
    data: /mnt/weatherloss/WindPower/data/EGU26/Anemoidatasets
    output: ${system.output.root}
    logs:
      base: ${system.output.root}/${system.output.logs.root}
      wandb: ${hardware.paths.logs.base}/${system.output.logs.wandb}
      mlflow: ${hardware.paths.logs.base}/${system.output.logs.mlflow}
      tensorboard: ${hardware.paths.logs.base}/${system.output.logs.tensorboard}
    checkpoints: ${system.output.root}/${system.output.checkpoints.root}
    plots: ${system.output.root}/${system.output.plots}
    profiler: ${system.output.root}/${system.output.profiler}
    graph: ${system.output.root}/graphs
    warm_start: ${system.input.warm_start}

  files:
    datasets:
      outer: ${system.input.dataset.outer}
      inner: ${system.input.dataset.inner}
    graph: ${system.input.graph}
    truncation: ${system.input.truncation}
    truncation_inv: ${system.input.truncation_inv}
    checkpoint:
      every_n_epochs: ${system.output.checkpoints.every_n_epochs}
      every_n_train_steps: ${system.output.checkpoints.every_n_train_steps}
      every_n_minutes: ${system.output.checkpoints.every_n_minutes}
    warm_start: ${system.input.warm_start}

# ============================================================
# DATA / DATAMODULE
# ============================================================
datamodule:
  _target_: anemoi.training.data.datamodule.AnemoiDatasetsDataModule

data:
  format: zarr
  frequency: 3h
  timestep: 3h

  forcing:
    - lsm
    - insolation
    - sin_julian_day
    - cos_julian_day
    - cos_latitude
    - sin_latitude
    - cos_longitude
    - sin_longitude
    - z_sfc
    - capacity
    - turbinecount
    - turbinemask

  diagnostic: 
    - power

  remapped: null

  imputer: 
    0.0:
      - power
      - capacity 
      - turbinecount
      - turbinemask

  normalizer:
    default: mean-std
    std:
      - q_1000
      - q_950
      - q_900
      - q_850
      - q_800
      - q_750
      - q_700
      - q_600
      - q_500
    max:
      - z_sfc
      - turbinecount
    min-max:
      - power
    none:
      - lsm
      - mcc
      - cos_latitude
      - sin_latitude
      - cos_longitude
      - sin_longitude
      - turbinemask

  remapper:
    default: none

  processors:
    imputer: 
      _target_: anemoi.models.preprocessing.imputer.ConstantImputer
      config: ${data.imputer}

    normalizer:
      _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
      _convert_: all
      config: ${data.normalizer}


  num_features: null

# ============================================================
# DATALOADER
# ============================================================
dataloader:
  prefetch_factor: 2
  pin_memory: true
  read_group_size: ${hardware.num_gpus_per_model}

  num_workers:
    training: 8
    validation: 8
    test: 2
    predict: 2

  batch_size:
    training: 4
    validation: 4
    test: 1
    predict: 1

  limit_batches:
    training: null
    validation: null
    test: 20
    predict: 20

  grid_indices:
    _target_: anemoi.training.data.grid_indices.MaskedGrid
    nodes_name: data
    node_attribute_name: indices_connected_nodes

  dataset:
    dataset:
      cutout:
        - dataset: ${hardware.files.datasets.inner}
        #  drop: ["power", "capacity", "turbinecount", "turbinemask"]
          reorder: &reorder_map
            cos_julian_day: 0
            cos_latitude: 1
            cos_longitude: 2
            insolation: 3
            lsm: 4
            mcc: 5
            msl: 6
            q_1000: 7
            q_500: 8
            q_600: 9
            q_700: 10
            q_750: 11
            q_800: 12
            q_850: 13
            q_900: 14
            q_950: 15
            sin_julian_day: 16
            sin_latitude: 17
            sin_longitude: 18
            t2m: 19
            t_1000: 20
            t_500: 21
            t_600: 22
            t_700: 23
            t_750: 24
            t_800: 25
            t_850: 26
            t_900: 27
            t_950: 28
            u_1000: 29
            u_500: 30
            u_600: 31
            u_700: 32
            u_750: 33
            u_800: 34
            u_850: 35
            u_900: 36
            u_950: 37
            v_1000: 38
            v_500: 39
            v_600: 40
            v_700: 41
            v_750: 42
            v_800: 43
            v_850: 44
            v_900: 45
            v_950: 46
            wdir100_cos: 47
            wdir100_sin: 48
            wdir10_cos: 49
            wdir10_sin: 50
            ws10: 51
            ws100: 52
            z_1000: 53
            z_500: 54
            z_600: 55
            z_700: 56
            z_750: 57
            z_800: 58
            z_850: 59
            z_900: 60
            z_950: 61
            z_sfc: 62
            power: 63
            capacity: 64
            turbinecount: 65
            turbinemask: 66 

        - dataset: ${hardware.files.datasets.outer}
          #drop: ["power", "capacity", "turbinecount", "turbinemask"]
          reorder: *reorder_map

      min_distance_km: 0
      adjust: dates

    select:
      - cos_julian_day
      - cos_latitude
      - cos_longitude
      - insolation
      - lsm
      - mcc
      - msl
      - q_1000
      - q_500
      - q_600
      - q_700
      - q_750
      - q_800
      - q_850
      - q_900
      - q_950
      - sin_julian_day
      - sin_latitude
      - sin_longitude
      - t2m
      - t_1000
      - t_500
      - t_600
      - t_700
      - t_750
      - t_800
      - t_850
      - t_900
      - t_950
      - u_1000
      - u_500
      - u_600
      - u_700
      - u_750
      - u_800
      - u_850
      - u_900
      - u_950
      - v_1000
      - v_500
      - v_600
      - v_700
      - v_750
      - v_800
      - v_850
      - v_900
      - v_950
