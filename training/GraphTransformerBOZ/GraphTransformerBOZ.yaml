#This is the blueprint for all the different configurations we make
defaults:        
  - training: default
  - _self_ 
#All default .yaml files are overwritten here
# ============# ============# ============# ============# ============
# ============# ============# ============# ============# ============
datamodule: 
    _target_: anemoi.training.data.datamodule.AnemoiDatasetsDataModule #deterministic forecasting
data: #this component is not changed per configuration
#Configuration for input/output data handling
  format: zarr
  frequency: 3h
  timestep: 3h
  forcing:  #only goes in, but doesnt come out
    - lsm # Land-Sea Mask
    - insolation # Solar radiation 
    - julian_day
    - mask #1 or nan if turbines
    #- turbines #turbines count 
    #- capacity 
    - cos_latitude
    - sin_latitude
    - cos_longitude
    - sin_longitude
    - surface_geopotential

  #doesnt go in, only comes out 
  diagnostic:
    - power 
  remapped: null

  imputer:
    0.0:
      - power
      - mask
     # - turbines
     # - capacity 

       
  normalizer:
    default: mean-std
  # zero value in the normalized space.
    max:
    - surface_geopotential
    min-max:
    - power
    none: 
    - mask
    - lsm
    - cos_latitude
    - sin_latitude 
    - cos_longitude
    - sin_longitude 
    - wdir10_cos
    - wdir10_sin
    - wdir_cos100
    - wdir_cos150
    - wdir_cos200
    - wdir_cos50
    - wdir_sin100
    - wdir_sin150
    - wdir_sin200
    - wdir_sin50

  remapper: #spatial transformations -> no need
    default: none
    
  processors:
    imputer:
      _target_: anemoi.models.preprocessing.imputer.ConstantImputer
      config: ${data.imputer}
      
    normalizer: #preprocessing, i.e. normalizing the data
      _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
      _convert_: all
      config: ${data.normalizer}
  num_features: null  # number of features in the forecast state

 # ============# ============# ============# ============# ============
 # ============# ============# ============# ============# ============
dataloader: #is also not changed for a different configuration
# Settings for loading data during training/testing
  prefetch_factor: 2 # Number of batches to load in advance per worker thread.
  pin_memory: true
  read_group_size: ${hardware.num_gpus_per_model}
  num_workers:
    training: 6
    validation: 8
    test: 8
    predict: 8
  batch_size:
    training: 1
    validation: 2
    test: 2
    predict: 2

# Runs only N training batches [N = integer | null]
  limit_batches:
    training: null
    validation: null
    test: 20
    predict: 20
  grid_indices:
    _target_: anemoi.training.data.grid_indices.FullGrid
    nodes_name: ${graph.data}

  dataset:
    dataset:  ${hardware.files.datasets.outer}
    select:
    # === 3D ATMOSPHERIC STATE (Input Features) ===
    - u_1000
    - v_1000
    - u_950
    - v_950
    - u_900
    - v_900
    - u_850
    - v_850
    - u_800
    - v_800
    - u_750
    - v_750
    - u_700
    - v_700
    - u_600
    - v_600
    - u_500
    - v_500
    # Temperature (K) at pressure levels (500 to 1000 hPa)
    - t_1000
    - t_950
    - t_900
    - t_850
    - t_800
    - t_750
    - t_700
    - t_600
    - t_500
    # Geopotential (m^2/s^2) and Mean Sea Level Pressure (Pa)
    - z_1000
    - z_950
    - z_900
    - z_850
    - z_800
    - z_750
    - z_700
    - z_600
    - z_500
    # Relative Humidity (%) 
    - r_1000
    - r_950
    - r_900
    - r_850
    - r_800
    - r_750
    - r_700
    - r_600
    - r_500
    # === SURFACE/STATIC/TIME VARIABLES ===
    - msl
    - mcc
    - ws10 
    - ws50
    - ws100
    - ws150
    - ws200
    - wdir10_cos
    - wdir10_sin
    - wdir_cos50
    - wdir_sin50
    - wdir_cos100
    - wdir_sin100
    - wdir_cos150
    - wdir_sin150
    - wdir_cos200
    - wdir_sin200
    - t2m # 2m Temperature
    - surface_geopotential
    - lsm # Land-Sea Mask- 
    - mask
    - insolation # Solar radiation 
    - julian_day
    - cos_latitude
    - sin_latitude
    - cos_longitude
    - sin_longitude
    - power
    #- turbines 
    #- capacity 
  training:
    dataset: ${hardware.files.datasets.outer}
    start: "2020-10-01"
    end: "2024-01-31"
    frequency: ${data.frequency}
    drop: []
  validation_rollout: 1 # number of rollouts to use for validation, must be equal or greater than rollout expected by callbacks
  validation:
    dataset: ${hardware.files.datasets.outer}
    start: "2024-02-01"
    end: "2024-07-31"
    frequency: ${data.frequency}
    drop: []
  test:
    dataset: ${hardware.files.datasets.outer}
    start: "2024-08-01"
    end: "2025-07-31"
    frequency: ${data.frequency}
 # ============# ============# ============# ============# ============
 # ============# ============# ============# ============# ============
#configures how model performance is analyzed visually and numerically.
#three default yaml files: plot, callbacks and benchmark_profiler
#shouldn't change between configurations
diagnostics: #This section controls how model performance is analyzed:
  plot:
    asynchronous: true
    datashader: true
    frequency:
      batch: 500
      epoch: 2
    parameters:
    - z_500
    - t_850
    - t2m
    - ws100
    - power

    sample_idx: 0
    precip_and_related_fields: []
    callbacks: {}
  callbacks: {}
  # benchmark_profiler:
  #   memory:
  #     enabled: true
  #     steps: 5
  #     warmup: 2
  #     extra_plots: false
  #     trace_rank0_only: false
  #   time:
  #     enabled: true
  #     verbose: true
  #   speed:
  #     enabled: true
  #   system:
  #     enabled: true
  #   model_summary:
  #     enabled: true
  #   snapshot:
  #     enabled: true
  #     steps: 4
  #     warmup: 0
  debug:
    anomaly_detection: false
  profiler: false
  enable_checkpointing: true
  checkpoint:
    every_n_minutes:
      save_frequency: 60
      num_models_saved: 3
    every_n_epochs:
      save_frequency: 1
      num_models_saved: -1
    every_n_train_steps:
      save_frequency: null
      num_models_saved: 0
  log:
    wandb:
      enabled: false
      offline: false
      log_model: false
      project: Anemoi
      entity: "University of Antwerp"
      gradients: false
      parameters: false
    tensorboard:
      enabled: true
    mlflow:
      enabled: false
      # offline: false
      # authentication: true
      # log_model: false
      # tracking_uri: https://mlflow.ecmwf.int
      # experiment_name: ${oc.env:EXP_NAME}
      # project_name: anemoi
      # system: true
      # terminal: true
      # run_name: ${oc.decode:${oc.env:RUN_NAME}}
      # on_resume_create_child: true
      # expand_hyperparams:
      # - config
    interval: 100
  enable_progress_bar: true
  print_memory_summary: false
# ============# ============# ============# ============# ============
# ============# ============# ============# ============# ============
hardware:  #change the output depending on the configuration!
  paths:
    data: /mnt/data/weatherloss/WindPower/data
    output: /mnt/data/weatherloss/WindPower/training/GraphTransformerBOZ
    logs:
      base: ${hardware.paths.output}/logs
      wandb: ${hardware.paths.logs.base}
      mlflow: ${hardware.paths.logs.base}/mlflow
      tensorboard: ${hardware.paths.logs.base}/tensorboard
    checkpoints: ${hardware.paths.output}/checkpoint
    plots: ${hardware.paths.output}/plots
    profiler: ${hardware.paths.output}/profiler/
    graph: ${hardware.paths.output}/graphs/
    warm_start: ${hardware.paths.output}/checkpoint/BasicGraphT
  files:
    datasets:
        inner: ${hardware.paths.data}/BOZ_inner_Anemoids.zarr
        outer: ${hardware.paths.data}/BOZ_Anemoids.zarr
    graph: "/mnt/data/weatherloss/WindPower/graphs/tryout.pt"
    truncation: null
    truncation_inv: null
    checkpoint:
      every_n_epochs: anemoi-by_epoch-epoch_{epoch:03d}-step_{step:06d}
      every_n_train_steps: anemoi-by_step-epoch_{epoch:03d}-step_{step:06d}
      every_n_minutes: anemoi-by_time-epoch_{epoch:03d}-step_{step:06d}
    warm_start: anemoi-by_epoch-epoch_012-step_031590.ckpt
  accelerator: gpu # auto
  num_gpus_per_node: 4 #  ${oc.decode:${oc.env:SLURM_GPUS_PER_NODE, 1}}
  num_nodes: 1 # ${oc.decode:${oc.env:SLURM_NNODES, 1}}
  num_gpus_per_model: 1   #  or 4 depending on performance

 # ============# ============# ============# ============# ============
 # ============# ============# ============# ============# ============ 
graph:
  overwrite: true
  data: data
  hidden: hidden
  #### JOB SCRIPT SETTINGS ####

# Anemoi-graphs config
  nodes:
    # Data nodes
    data:
      node_builder:
        _target_: anemoi.graphs.nodes.AnemoiDatasetNodes #node builder
        dataset:
          cutout:
            - dataset: ${hardware.files.datasets.inner}
              #thinning: 50
            - dataset: ${hardware.files.datasets.outer}
          min_distance_km: 0
          adjust: all
      attributes:
        area_weight:
          _target_: anemoi.graphs.nodes.attributes.UniformWeights # options: Area, Uniform
          norm: unit-max # options: l1, l2, unit-max, unit-sum, unit-std
        cutout:
          _target_: anemoi.graphs.nodes.attributes.CutOutMask
        boundary:
          _target_: anemoi.graphs.nodes.attributes.BooleanNot
          masks: 
            _target_: anemoi.graphs.nodes.attributes.CutOutMask #marks true for the boundary
        turbine_mask:
          _target_: anemoi.graphs.nodes.attributes.masks.NonmissingAnemoiDatasetVariable
          variable: mask 
        
        
  # Hidden nodes
    hidden:
      node_builder:
        _target_: anemoi.graphs.nodes.LimitedAreaTriNodes
        resolution: 9 
        reference_node_name: data
        mask_attr_name: cutout #inner region 
        margin_radius_km: 600 #(default is 100km)

  edges:
# Encoder configuration
  - source_name: data
    target_name: hidden
    edge_builders:
    - _target_: anemoi.graphs.edges.KNNEdges
      num_nearest_neighbours:  12
      source_mask_attr_name: cutout
    - _target_: anemoi.graphs.edges.CutOffEdges # connects only boundary nodes
      cutoff_factor: 4 # only for cutoff method, sets the cut off radius 
      source_mask_attr_name: boundary
    attributes:
      edge_length:
        _target_: anemoi.graphs.edges.attributes.EdgeLength
        norm: unit-max
      edge_dirs:
        _target_: anemoi.graphs.edges.attributes.EdgeDirection
        norm: unit-std
  # Processor configuration
  - source_name: hidden
    target_name: hidden
    edge_builders:
    - _target_: anemoi.graphs.edges.MultiScaleEdges
      x_hops: 1
      scale_resolutions: 9
    attributes:
      edge_length:
        _target_: anemoi.graphs.edges.attributes.EdgeLength
        norm: unit-max
      edge_dirs:
        _target_: anemoi.graphs.edges.attributes.EdgeDirection
        norm: unit-std
  # Decoder configuration
  - source_name: hidden
    target_name: data
    edge_builders:
    - _target_: anemoi.graphs.edges.KNNEdges
      target_mask_attr_name: cutout
      num_nearest_neighbours: 5
    attributes:
      edge_length:
        _target_: anemoi.graphs.edges.attributes.EdgeLength
        norm: unit-max
      edge_dirs:
        _target_: anemoi.graphs.edges.attributes.EdgeDirection
        norm: unit-std

  post_processors:
    - _target_: anemoi.graphs.processors.RestrictEdgeLength
      source_name: data
      target_name: hidden
      max_length_km: 30
      source_mask_attr_name: cutout
      
    - _target_: anemoi.graphs.processors.RemoveUnconnectedNodes
      nodes_name: data
      #ignore: cutout # optional
      save_mask_indices_to_attr: indices_connected_nodes # optional
 # ============# ============# ============# ============# ============
 # ============# ============# ============# ============# ============
 
model:
  num_channels: 128
  cpu_offload: false
  
  model:
    _target_: anemoi.models.models.AnemoiModelEncProcDec

  keep_batch_sharded: true

  # central place to declare kernels / activations (replaces the old "activation:" string)
  layer_kernels:
    LayerNorm:
      _target_: torch.nn.LayerNorm
    Linear:
      _target_: torch.nn.Linear
    Activation:
      _target_: torch.nn.GELU
    QueryNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
    KeyNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false

  # === Processor / Encoder / Decoder ===
  processor:
    _target_: anemoi.models.layers.processor.GraphTransformerProcessor
    trainable_size: ${model.trainable_parameters.hidden2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_layers: 8
    num_chunks: 2         
    mlp_hidden_ratio: 2
    num_heads: 8
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}

  encoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
    trainable_size: ${model.trainable_parameters.data2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1          
    mlp_hidden_ratio: 2
    num_heads: 8
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}
    # shard_strategy: "edges"   # optional; omit unless you specifically want sharding

  decoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
    trainable_size: ${model.trainable_parameters.hidden2data}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1         
    mlp_hidden_ratio: 2
    num_heads: 8
    initialise_data_extractor_zero: false
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}
    # shard_strategy: "edges"   # optional

  # no masking by default in the new template
  output_mask:
    _target_: anemoi.training.utils.masks.NoOutputMask
    # nodes_name: data
    # attribute_name: turbine_mask
    # variables: power 

  trainable_parameters:
    data: 8
    hidden: 8
    data2hidden: 8
    hidden2data: 8
    hidden2hidden: 8

  attributes:
    edges:
    - edge_length
    - edge_dirs
    nodes: []


  bounding: 
    - _target_: anemoi.models.layers.bounding.ReluBounding #[0, infinity)
      variables:
        - mask 
        - mcc 
        - r
       # - turbines
       # - capacity 
    - _target_: anemoi.models.layers.bounding.HardtanhBounding #[0, 1)
      variables:
        - power
      min_val: 0.0  # Normalized minimum value (0 power)
      max_val: 1.0  # Normalized maximum value (full capacity)
        


 # ============# ============# ============# ============# ============
 # ============# ============# ============# ============# ============
training:
# Several scalers can be added here. In order to be applied their names must be included in the loss.
# scaler name must be included in `scalers` in the losses for this to be applied.

  run_id: BasicGraphT
  fork_run_id: null
  load_weights_only: false
  transfer_learning: null # activate to perform transfer learning
  
  deterministic: false #force right order
  
  precision: 16-mixed
  
  # multistep input
# 1 = single step scheme, X(t-1) used to predict X(t)
# k > 1: multistep scheme, uses [X(t-k), X(t-k+1), ... X(t-1)] to predict X(t)
# Deepmind use k = 2 in their model
  multistep_input: 2
  accum_grad_batches: 1
  num_sanity_val_steps: 6
  
  gradient_clip:
    val: 32.0
    algorithm: value
    
  swa:
    enabled: false
    lr: 0.0001 #not used 
    
  optimizer:
    zero: False # use ZeroRedundancyOptimizer ; saves memory for larger models
    kwargs:
      betas: [0.9, 0.95]

  model_task: anemoi.training.train.tasks.GraphForecaster
  
  strategy:
      _target_: anemoi.training.distributed.strategy.DDPGroupStrategy
      num_gpus_per_model: ${hardware.num_gpus_per_model}
      read_group_size: ${dataloader.read_group_size}
      
  loss_gradient_scaling: False

  scalers:
    turbine_node_weights:
      _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
      nodes_name: ${graph.data}
      nodes_attribute_name: turbine_mask
      norm: null

    
    # loss function for the model
    # loss function for the model
  training_loss:
    # loss class to initialise
    _target_: anemoi.training.losses.MAELoss
    scalers: ['pressure_level', 'general_variable', 'nan_mask_weights', 'node_weights']
    ignore_nans: True
  # training_loss:
  #     # loss class to initialise
  #   _target_: anemoi.training.losses.combined.CombinedLoss
  #   loss_weights: [1.0, 0] 
  #   losses:
  #     - _target_: anemoi.training.losses.HuberLoss
  #       scalers: ['pressure_level','variable','nan_mask_weights','node_weights'] #['pressure_level','general_variable','nan_mask_weights','node_weights']
  #       ignore_nans: True
  #     - _target_: anemoi.training.losses.HuberLoss
  #       scalers: ['pressure_level','variable','node_weights', 'nan_mask_weights', 'turbine_node_weights']
  #       ignore_nans: True

  validation_metrics:
  # loss class to initialise
    mae:
      _target_: anemoi.training.losses.MAELoss
    # Scalers to include in loss calculation
    # Cannot scale over the variable dimension due to possible remappings.
    # Available scalers include:
    # - 'loss_weights_mask': Giving imputed NaNs a zero weight in the loss function
    # Use the `scale_validation_metrics` section to variable scale.
      scalers: ['node_weights']
    # other kwargs
      ignore_nans: True

    
  variable_groups:
    default: sfc
    pl:
      param: []
    

  scale_validation_metrics:
    scalars_to_apply: []
    metrics: []
  rollout:
    start: 1 # change for finetuning 2
    epoch_increment: 1 #change for finetuning
    max: 10 #change for finetuning 
  max_epochs: 15
  max_steps: 50000 #with 4 GPU's #260000  
  lr:
  # Set this value depending on the number of GPUs you're using
  # global_lr = local_lr * num_gpus / gpus_per_model
    rate: 3.125e-5
  # Alternatives:
  # rate: 2.5e-4     # for 1 GPU
  # rate: 1.25e-4    # for 2 GPUs
  # rate  0.83e-4    # for 3 GPU's
  # rate  6.25e-5    # for 4 GPU's
  # rate: 4.1667e-5  # for 6 GPUs
  # rate: 3.125e-5   # for 8 GPUs 
    #   # Changes in per-gpu batch_size should come with a rescaling of the local_lr
#   # in order to keep a constant global_lr
#   # global_lr = local_lr * num_gpus_per_node * num_nodes / gpus_per_model
    iterations: ${training.max_steps}
    min: 3.0e-07
    warmup_t: 1000
  variable_loss_scaling:
    default: 1
    pl: 
      r: 0.6 #0.6 #0.3
      t: 6 #6 #3
      u: 0.8 #0.8 #0.4
      v: 0.5 #0.5 #0.25
      z: 12 #12 #0.5 
    sfc:   
      ws100: 1.5
      power: 5
    
        # cp: 0.0025
  metrics: 
    - power
    - ws100
    - z_850
    - t_850
    - u_850
    - v_850
  submodules_to_freeze: []
  pressure_level_scaler:
    _target_: anemoi.training.data.scaling.ReluPressureLevelScaler
    minimum: 0.2
    slope: 0.001
  node_loss_weights:
    _target_: anemoi.training.losses.nodeweights.GraphNodeAttribute
    target_nodes: data
    node_attribute: area_weight #turbine_mask  #area_weight #turbine_mask (for finetuning?)

config_validation: False #sanity check config files 
