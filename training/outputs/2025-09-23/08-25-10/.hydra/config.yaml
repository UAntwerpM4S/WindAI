training:
  scalers:
    general_variable:
      _target_: anemoi.training.losses.scalers.GeneralVariableLossScaler
      weights:
        default: 1
        q: 0.6
        t: 6
        u: 0.8
        v: 0.5
        w: 0.001
        z: 12
        sp: 10
        10u: 0.1
        10v: 0.1
        2d: 0.5
        tp: 0.025
        cp: 0.0025
    pressure_level:
      _target_: anemoi.training.losses.scalers.ReluVariableLevelScaler
      group: pl
      y_intercept: 0.2
      slope: 0.001
    nan_mask_weights:
      _target_: anemoi.training.losses.scalers.NaNMaskScaler
    stdev_tendency:
      _target_: anemoi.training.losses.scalers.StdevTendencyScaler
    var_tendency:
      _target_: anemoi.training.losses.scalers.VarTendencyScaler
    node_weights:
      _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
      nodes_name: ${graph.data}
      nodes_attribute_name: area_weight
      norm: unit-sum
  run_id: null
  fork_run_id: null
  transfer_learning: null
  load_weights_only: false
  deterministic: false
  precision: 16-mixed
  multistep_input: 2
  accum_grad_batches: 1
  num_sanity_val_steps: 6
  gradient_clip:
    val: 32.0
    algorithm: value
  swa:
    enabled: false
    lr: 0.0001
  optimizer:
    zero: false
    kwargs:
      betas:
      - 0.9
      - 0.95
  model_task: anemoi.training.train.tasks.GraphForecaster
  strategy:
    _target_: anemoi.training.distributed.strategy.DDPGroupStrategy
    num_gpus_per_model: ${hardware.num_gpus_per_model}
    read_group_size: ${dataloader.read_group_size}
  loss_gradient_scaling: false
  training_loss:
    _target_: anemoi.training.losses.MSELoss
    scalers:
    - pressure_level
    - general_variable
    - nan_mask_weights
    - node_weights
    ignore_nans: false
  validation_metrics:
    mse:
      _target_: anemoi.training.losses.MSELoss
      scalers:
      - node_weights
      ignore_nans: true
  variable_groups:
    default: sfc
    pl:
      param: []
  metrics: []
  rollout:
    start: 1
    epoch_increment: 0
    max: 1
  max_epochs: 5
  max_steps: 3000
  lr:
    warmup: 1000
    rate: 4.1667e-05
    iterations: ${training.max_steps}
    min: 3.0e-07
    warmup_t: 1000
  submodules_to_freeze: []
  scale_validation_metrics:
    scalars_to_apply:
    - variable
    metrics:
    - all
  variable_loss_scaling:
    default: 1
    pl: []
    sfc: []
datamodule:
  _target_: anemoi.training.data.datamodule.AnemoiDatasetsDataModule
data:
  format: zarr
  frequency: 3h
  timestep: 3h
  forcing: []
  diagnostic: []
  remapped: null
  normalizer:
    default: mean-std
    min-max: null
    max:
    - orog
    none: []
  imputer:
    default: none
  remapper:
    default: none
  processors:
    normalizer:
      _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
      _convert_: all
      config: ${data.normalizer}
  num_features: null
dataloader:
  prefetch_factor: 2
  pin_memory: true
  read_group_size: ${hardware.num_gpus_per_model}
  num_workers:
    training: 6
    validation: 8
    test: 8
    predict: 8
  batch_size:
    training: 1
    validation: 1
    test: 1
    predict: 1
  limit_batches:
    training: null
    validation: null
    test: 20
    predict: 20
  grid_indices:
    _target_: anemoi.training.data.grid_indices.FullGrid
    nodes_name: ${graph.data}
  dataset:
    dataset: ${hardware.paths.data}/${hardware.files.dataset}
    select:
    - t2m
    - mcc
    - msl
    - si10
    - sr
    - wdir10
    - orog
    - ws100
    - wind_power
  training:
    dataset: ${dataloader.dataset}
    start: '2023-01-01'
    end: '2023-12-31'
    frequency: ${data.frequency}
    drop: []
  validation_rollout: 1
  validation:
    dataset: ${dataloader.dataset}
    start: '2024-01-01'
    end: '2024-02-29'
    frequency: ${data.frequency}
    drop: []
  test:
    dataset: ${dataloader.dataset}
    start: '2024-03-01'
    end: '2024-10-31'
    frequency: ${data.frequency}
diagnostics:
  plot:
    asynchronous: true
    datashader: true
    frequency:
      batch: 1500
      epoch: 25
    parameters:
    - t2m
    sample_idx: 0
    precip_and_related_fields: []
    callbacks: {}
  callbacks: {}
  debug:
    anomaly_detection: false
  profiler: false
  enable_checkpointing: true
  checkpoint:
    every_n_minutes:
      save_frequency: 60
      num_models_saved: 3
    every_n_epochs:
      save_frequency: 1
      num_models_saved: -1
    every_n_train_steps:
      save_frequency: null
      num_models_saved: 0
  log:
    wandb:
      enabled: false
      offline: false
      log_model: false
      project: Anemoi
      entity: University of Antwerp
      gradients: false
      parameters: false
    tensorboard:
      enabled: true
    mlflow:
      enabled: false
    interval: 100
  enable_progress_bar: true
  print_memory_summary: false
hardware:
  paths:
    data: /mnt/data/weatherloss/WindPower/data
    output: /mnt/data/weatherloss/WindPower/Runs
    logs:
      base: ${hardware.paths.output}/logs
      wandb: ${hardware.paths.logs.base}
      mlflow: ${hardware.paths.logs.base}/mlflow
      tensorboard: ${hardware.paths.logs.base}/tensorboard
    checkpoints: ${hardware.paths.output}/checkpoint
    plots: ${hardware.paths.output}/plots
    profiler: ${hardware.paths.output}/profiler/
    graph: ${hardware.paths.output}/graphs/
  files:
    dataset: CERRA5.zarr
    graph: pretrain_n320.pt
    truncation: null
    truncation_inv: null
    checkpoint:
      every_n_epochs: anemoi-by_epoch-epoch_{epoch:03d}-step_{step:06d}
      every_n_train_steps: anemoi-by_step-epoch_{epoch:03d}-step_{step:06d}
      every_n_minutes: anemoi-by_time-epoch_{epoch:03d}-step_{step:06d}
    warm_start: null
  accelerator: gpu
  num_gpus_per_node: 6
  num_nodes: 1
  num_gpus_per_model: 1
graph:
  overwrite: true
  data: data
  hidden: hidden
  nodes:
    data:
      node_builder:
        _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
        dataset: ${dataloader.dataset}
      attributes:
        area_weight:
          _target_: anemoi.graphs.nodes.attributes.area_weights.SphericalAreaWeights
          norm: unit-max
    hidden:
      node_builder:
        _target_: anemoi.graphs.nodes.TriNodes
        resolution: 7
      attributes:
        area_weight:
          _target_: anemoi.graphs.nodes.attributes.area_weights.SphericalAreaWeights
          norm: unit-max
  edges:
  - source_name: ${graph.data}
    target_name: ${graph.hidden}
    edge_builders:
    - _target_: anemoi.graphs.edges.KNNEdges
      num_nearest_neighbours: 12
    attributes: ${graph.attributes.edges}
  - source_name: ${graph.hidden}
    target_name: ${graph.hidden}
    edge_builders:
    - _target_: anemoi.graphs.edges.MultiScaleEdges
      x_hops: 1
      scale_resolutions: ${graph.nodes.hidden.node_builder.resolution}
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  - source_name: ${graph.hidden}
    target_name: ${graph.data}
    edge_builders:
    - _target_: anemoi.graphs.edges.KNNEdges
      num_nearest_neighbours: 3
    attributes: ${graph.attributes.edges}
  attributes:
    nodes:
      area_weight:
        _target_: anemoi.graphs.nodes.attributes.area_weights.SphericalAreaWeights
        norm: unit-max
    edges:
      edge_length:
        _target_: anemoi.graphs.edges.attributes.EdgeLength
        norm: unit-std
      edge_dirs:
        _target_: anemoi.graphs.edges.attributes.EdgeDirection
        norm: unit-std
model:
  num_channels: 256
  cpu_offload: false
  model:
    _target_: anemoi.models.models.AnemoiModelEncProcDec
  keep_batch_sharded: true
  layer_kernels:
    LayerNorm:
      _target_: torch.nn.LayerNorm
    Linear:
      _target_: torch.nn.Linear
    Activation:
      _target_: torch.nn.GELU
    QueryNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
    KeyNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
  processor:
    _target_: anemoi.models.layers.processor.GraphTransformerProcessor
    trainable_size: ${model.trainable_parameters.hidden2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_layers: 16
    num_chunks: 2
    mlp_hidden_ratio: 4
    num_heads: 16
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}
  encoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
    trainable_size: ${model.trainable_parameters.data2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1
    mlp_hidden_ratio: 4
    num_heads: 16
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}
  decoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
    trainable_size: ${model.trainable_parameters.hidden2data}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1
    mlp_hidden_ratio: 4
    num_heads: 16
    initialise_data_extractor_zero: false
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}
  output_mask:
    _target_: anemoi.training.utils.masks.NoOutputMask
  trainable_parameters:
    data: 8
    hidden: 8
    data2hidden: 8
    hidden2data: 8
    hidden2hidden: 8
  attributes:
    edges:
    - edge_length
    - edge_dirs
    nodes: []
  bounding: []
config_validation: false
