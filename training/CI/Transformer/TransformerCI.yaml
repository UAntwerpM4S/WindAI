# Transformer.yaml
# Adapted to new Anemoi config layout with top-level `system: {hardware, input, output}`
# while keeping backward-compatible `${hardware.*}` references used throughout your config.

defaults:
  - model: transformer
  - training: default
  - _self_

# ============================================================
# NEW REQUIRED TOP-LEVEL SYSTEM BLOCK
# ============================================================
system:
  hardware:
    accelerator: gpu
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1

  input:
    dataset:
        inner: ${hardware.paths.data}/Cerra_CI_HR_A.zarr
        outer: ${hardware.paths.data}/Cerra_CI_LR_A.zarr
    graph: /mnt/weatherloss/WindPower/graphs/Northsea.pt
    truncation: null
    truncation_inv: null
    warm_start: null #/mnt/weatherloss/WindPower/training/CI/Transformer/checkpoint/d40d790a-fb4f-4f16-a785-2703030e4778/anemoi-by_epoch-epoch_012-step_150000.ckpt


  output:
    root: /mnt/weatherloss/WindPower/training/CI/Transformer
    logs:
      root: logs
      wandb: wandb
      mlflow: mlflow
      tensorboard: tensorboard
    checkpoints:
      root: checkpoint
      every_n_epochs: anemoi-by_epoch-epoch_{epoch:03d}-step_{step:06d}
      every_n_train_steps: anemoi-by_step-epoch_{epoch:03d}-step_{step:06d}
      every_n_minutes: anemoi-by_time-epoch_{epoch:03d}-step_{step:06d}
    plots: plots
    profiler: profiler

# ============================================================
# BACKWARD-COMPAT SHIM: keep your existing `${hardware.*}` refs working
# ============================================================
hardware:
  accelerator: ${system.hardware.accelerator}
  num_gpus_per_node: ${system.hardware.num_gpus_per_node}
  num_nodes: ${system.hardware.num_nodes}
  num_gpus_per_model: ${system.hardware.num_gpus_per_model}

  paths:
    data: /mnt/weatherloss/WindPower/data/NorthSea/Anemoidatasets
    output: ${system.output.root}
    logs:
      base: ${system.output.root}/${system.output.logs.root}
      wandb: ${hardware.paths.logs.base}/${system.output.logs.wandb}
      mlflow: ${hardware.paths.logs.base}/${system.output.logs.mlflow}
      tensorboard: ${hardware.paths.logs.base}/${system.output.logs.tensorboard}
    checkpoints: ${system.output.root}/${system.output.checkpoints.root}
    plots: ${system.output.root}/${system.output.plots}
    profiler: ${system.output.root}/${system.output.profiler}
    graph: ${system.output.root}/graphs
    warm_start: ${system.input.warm_start}

  files:
    datasets:
      outer:  ${system.input.dataset.outer}
      inner: ${system.input.dataset.inner}


    graph: ${system.input.graph}

    truncation: ${system.input.truncation}
    truncation_inv: ${system.input.truncation_inv}

    checkpoint:
      every_n_epochs: ${system.output.checkpoints.every_n_epochs}
      every_n_train_steps: ${system.output.checkpoints.every_n_train_steps}
      every_n_minutes: ${system.output.checkpoints.every_n_minutes}

    warm_start: ${system.input.warm_start}

# ============================================================
# DATA / DATAMODULE
# ============================================================
datamodule:
  _target_: anemoi.training.data.datamodule.AnemoiDatasetsDataModule  # deterministic forecasting

data:
  format: zarr
  frequency: 3h
  timestep: 3h

  forcing:
    - lsm
    - insolation
    - julian_day
    - cos_latitude
    - sin_latitude
    - cos_longitude
    - sin_longitude
    - surface_geopotential

  diagnostic: null

  remapped: null

  imputer: null
  #   0.0:
  #     - power
  #     - mask
  #     - turbines
  #     - capacity

  normalizer:
    default: mean-std
    max:
      - surface_geopotential
    # min-max:
    #   - power
    none:
      - lsm
      - cos_latitude
      - sin_latitude
      - cos_longitude
      - sin_longitude
      - wdir10_cos
      - wdir10_sin
      - wdir_cos100
      - wdir_cos150
      - wdir_cos200
      - wdir_cos50
      - wdir_sin100
      - wdir_sin150
      - wdir_sin200
      - wdir_sin50

  remapper:
    default: none

  processors: 
  #   imputer:
  #     _target_: anemoi.models.preprocessing.imputer.ConstantImputer
  #     config: ${data.imputer}

    normalizer:
      _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
      _convert_: all
      config: ${data.normalizer}

  num_features: null

# ============================================================
# DATALOADER
# ============================================================
dataloader:
  prefetch_factor: 2
  pin_memory: true
  read_group_size: ${hardware.num_gpus_per_model}

  num_workers:
    training: 2
    validation: 2
    test: 2
    predict: 2

  batch_size:
    training: 1
    validation: 1
    test: 1
    predict: 1

  limit_batches:
    training: null
    validation: null
    test: 20
    predict: 20

  grid_indices:
    _target_: anemoi.training.data.grid_indices.MaskedGrid
    nodes_name: data
    node_attribute_name: indices_connected_nodes

  dataset:
    dataset:
      cutout:
        - dataset: ${hardware.files.datasets.inner}
        - dataset: ${hardware.files.datasets.outer}
      min_distance_km: 0
      adjust: all
    select:
      # === 3D ATMOSPHERIC STATE (Input Features) ===
      - u_1000
      - v_1000
      - u_950
      - v_950
      - u_900
      - v_900
      - u_850
      - v_850
      - u_800
      - v_800
      - u_750
      - v_750
      - u_700
      - v_700
      - u_600
      - v_600
      - u_500
      - v_500

      - t_1000
      - t_950
      - t_900
      - t_850
      - t_800
      - t_750
      - t_700
      - t_600
      - t_500

      - z_1000
      - z_950
      - z_900
      - z_850
      - z_800
      - z_750
      - z_700
      - z_600
      - z_500

      - r_1000
      - r_950
      - r_900
      - r_850
      - r_800
      - r_750
      - r_700
      - r_600
      - r_500

      # === SURFACE/STATIC/TIME VARIABLES ===
      - msl
      - mcc
      - ws10
      - ws50
      - ws100
      - ws150
      - ws200
      - wdir10_cos
      - wdir10_sin
      - wdir_cos50
      - wdir_sin50
      - wdir_cos100
      - wdir_sin100
      - wdir_cos150
      - wdir_sin150
      - wdir_cos200
      - wdir_sin200
      - t2m
      - surface_geopotential
      - lsm
      # - mask
      - insolation
      - julian_day
      - cos_latitude
      - sin_latitude
      - cos_longitude
      - sin_longitude
      # - power
      # - turbines
      # - capacity

  training:
    dataset: ${dataloader.dataset.dataset}
    start: "2020-01-01"
    end: "2024-01-31"
    frequency: ${data.frequency}
    drop: []

  validation_rollout: 1

  validation:
    dataset: ${dataloader.dataset.dataset}
    start: "2024-02-01"
    end: "2024-07-31"
    frequency: ${data.frequency}
    drop: []

  test:
    dataset: ${dataloader.dataset.dataset}
    start: "2024-08-01"
    end: "2025-07-31"
    frequency: ${data.frequency}

# ============================================================
# DIAGNOSTICS
# ============================================================
diagnostics:
  plot:
    asynchronous: true
    datashader: true
    frequency:
      batch: 500
      epoch: 2
    parameters:
      - z_500
      - t_850
      - t2m
      - ws100
      # - power
    sample_idx: 0
    precip_and_related_fields: []
    callbacks: []

  callbacks: []

  debug:
    anomaly_detection: false

  profiler: false
  enable_checkpointing: true

  checkpoint:
    every_n_minutes:
      save_frequency: 60
      num_models_saved: 3
    every_n_epochs:
      save_frequency: 1
      num_models_saved: -1
    every_n_train_steps:
      save_frequency: null
      num_models_saved: 0

  log:
    wandb:
      enabled: false
      offline: false
      log_model: false
      project: Anemoi
      entity: "University of Antwerp"
      gradients: false
      parameters: false

    tensorboard:
      enabled: true

    mlflow:
      enabled: false
      offline: false
      authentication: false
      log_model: false
      tracking_uri: "file:${hardware.paths.logs.mlflow}"
      experiment_name: "disabled"
      project_name: "disabled"
      system: true
      terminal: true
      run_name: null
      on_resume_create_child: true
      expand_hyperparams:
        - config

    interval: 100

  enable_progress_bar: true
  print_memory_summary: false

# ============================================================
# GRAPH
# ============================================================
graph:
  overwrite: true
  data: data
  hidden: hidden

  nodes:
    data:
      node_builder:
        _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
        dataset:
          cutout:
            - dataset: ${hardware.files.datasets.inner}
            - dataset: ${hardware.files.datasets.outer}
          min_distance_km: 0
          adjust: all
      attributes:
        area_weight:
          _target_: anemoi.graphs.nodes.attributes.UniformWeights
          norm: unit-max
        cutout:
          _target_: anemoi.graphs.nodes.attributes.CutOutMask
        boundary:
          _target_: anemoi.graphs.nodes.attributes.BooleanNot
          masks:
            _target_: anemoi.graphs.nodes.attributes.CutOutMask
        # turbine_mask:
        #   _target_: anemoi.graphs.nodes.attributes.masks.NonmissingAnemoiDatasetVariable
        #   variable: mask

    hidden:
      node_builder:
        _target_: anemoi.graphs.nodes.LimitedAreaTriNodes
        resolution: 9
        reference_node_name: data
        mask_attr_name: cutout
        margin_radius_km: 300

  edges:
    - source_name: data
      target_name: hidden
      edge_builders:
        - _target_: anemoi.graphs.edges.KNNEdges
          num_nearest_neighbours: 12
          source_mask_attr_name: cutout
        - _target_: anemoi.graphs.edges.CutOffEdges
          cutoff_factor: 4
          source_mask_attr_name: boundary
      attributes:
        edge_length:
          _target_: anemoi.graphs.edges.attributes.EdgeLength
          norm: unit-max
        edge_dirs:
          _target_: anemoi.graphs.edges.attributes.EdgeDirection
          norm: unit-std

    - source_name: hidden
      target_name: hidden
      edge_builders:
        - _target_: anemoi.graphs.edges.MultiScaleEdges
          x_hops: 1
          scale_resolutions: 9
      attributes:
        edge_length:
          _target_: anemoi.graphs.edges.attributes.EdgeLength
          norm: unit-max
        edge_dirs:
          _target_: anemoi.graphs.edges.attributes.EdgeDirection
          norm: unit-std

    - source_name: hidden
      target_name: data
      edge_builders:
        - _target_: anemoi.graphs.edges.KNNEdges
          target_mask_attr_name: cutout
          num_nearest_neighbours: 3
      attributes:
        edge_length:
          _target_: anemoi.graphs.edges.attributes.EdgeLength
          norm: unit-max
        edge_dirs:
          _target_: anemoi.graphs.edges.attributes.EdgeDirection
          norm: unit-std

  post_processors:
    - _target_: anemoi.graphs.processors.RestrictEdgeLength
      source_name: data
      target_name: hidden
      max_length_km: 50
      source_mask_attr_name: cutout

    - _target_: anemoi.graphs.processors.RemoveUnconnectedNodes
      nodes_name: data
      save_mask_indices_to_attr: indices_connected_nodes

# ============================================================
# MODEL
# ============================================================
model:
  num_channels: 256 #16
  cpu_offload: false

  model:
    _target_: anemoi.models.models.AnemoiModelEncProcDec

  keep_batch_sharded: true

  layer_kernels:
    LayerNorm:
      _target_: torch.nn.LayerNorm
    Linear:
      _target_: torch.nn.Linear
    Activation:
      _target_: torch.nn.GELU
    QueryNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
    KeyNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false

  processor:
    _target_: anemoi.models.layers.processor.TransformerProcessor
    num_layers: 8
    num_chunks: 2
    mlp_hidden_ratio: 2 # GraphTransformer or Transformer only
    num_heads: 8 # GraphTransformer or Transformer only
    window_size: 128
    dropout_p: 0.0 # GraphTransformer
    attention_implementation:  flash_attention #scaled_dot_product_attention # Possible values:      scaled_dot_product_attention, flash_attention
    qk_norm: False # Transformer and GraphTransformer only
    softcap: 0.0 # Transformer only
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}

  encoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
    trainable_size: ${model.trainable_parameters.data2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1
    mlp_hidden_ratio: 2
    num_heads: 8
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}

  decoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
    trainable_size: ${model.trainable_parameters.hidden2data}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 1
    mlp_hidden_ratio: 2
    num_heads: 8
    initialise_data_extractor_zero: false
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    layer_kernels: ${model.layer_kernels}

  output_mask:
    _target_: anemoi.training.utils.masks.NoOutputMask

  trainable_parameters:
    data: 8
    hidden: 8
    data2hidden: 8
    hidden2data: 8
    hidden2hidden: 8

  attributes:
    edges:
      - edge_length
      - edge_dirs
    nodes: []

  bounding:
    - _target_: anemoi.models.layers.bounding.ReluBounding
      variables:
        # - mask
        - mcc
        - r
        # - turbines
        # - capacity

    # - _target_: anemoi.models.layers.bounding.HardtanhBounding
    #   variables:
    #     - power
    #   min_val: 0.0
    #   max_val: 1.0

# ============================================================
# TRAINING
# ============================================================
training:
  run_id: null
  fork_run_id: null
  load_weights_only: false
  transfer_learning: null

  deterministic: false
  precision: 16-mixed

  multistep_input: 2
  accum_grad_batches: 1
  num_sanity_val_steps: 6

  gradient_clip:
    val: 32.0
    algorithm: value

  swa:
    enabled: false
    lr: 0.0001

  optimizer:
    _target_: torch.optim.AdamW
    betas: [0.9, 0.95]

  model_task: anemoi.training.train.tasks.GraphForecaster

  strategy:
    _target_: anemoi.training.distributed.strategy.DDPGroupStrategy
    num_gpus_per_model: ${hardware.num_gpus_per_model}
    read_group_size: ${dataloader.read_group_size}

  loss_gradient_scaling: false

  # scalers:
  #   turbine_node_weights:
  #     _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
  #     nodes_name: ${graph.data}
  #     nodes_attribute_name: turbine_mask
  #     norm: null

  training_loss:
    _target_: anemoi.training.losses.WeightedMSELoss
    scalers: ['pressure_level', 'general_variable', 'node_weights']
    ignore_nans: true

  validation_metrics:
    weighted_mse:
      _target_: anemoi.training.losses.WeightedMSELoss
      scalers: ['node_weights']
      ignore_nans: true

  variable_groups:
    default: sfc
    pl:
      param: []

  scale_validation_metrics:
    scalars_to_apply: []
    metrics: []

  rollout:
    start: 1
    epoch_increment: 0
    max: 1

  max_epochs: 25
  max_steps: 150000

  lr:
    rate: 3.125e-5
    iterations: ${training.max_steps}
    min: 3.0e-07
    warmup_t: 1000

  variable_loss_scaling:
    default: 1
    pl:
      r: 0.6
      t: 6
      u: 0.8
      v: 0.5
      z: 12
    sfc:
      ws100: 2
      ws10: 2

  metrics:
    # - power
    - ws100
    - z_850
    - t_850
    - u_850
    - v_850

  submodules_to_freeze: []

  pressure_level_scaler:
    _target_: anemoi.training.data.scaling.ReluPressureLevelScaler
    minimum: 0.2
    slope: 0.001

  node_loss_weights:
    _target_: anemoi.training.losses.nodeweights.GraphNodeAttribute
    target_nodes: data
    node_attribute: area_weight

config_validation: false