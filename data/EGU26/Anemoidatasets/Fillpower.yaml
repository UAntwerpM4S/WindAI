    - anemoi-dataset:
        dataset: /mnt/weatherloss/WindPower/data/EGU26/Anemoidatasets/era5_A_large.zarr
    - anemoi-dataset:
        dataset: /mnt/weatherloss/WindPower/data/EGU26/Anemoidatasets/NewSynthetic_synthetic_power_era5_A.zarr

statistics:
    start: "2020-01-01T00:00:00"
    end:   "2023-12-31T21:00:00"
    allow_nans: [synhtetic_power,power, turbinecount, turbinemask, capacity]