# build:
#   group_by: daily
#   variable_naming: param_levelist
dates:
  end: '2024-01-31T21:00:00'
  frequency: 3h
  start: '2024-01-01T00:00:00'
description: Toy dataset for wind power prediction in BOZ
input:
  join:
  - repeated-dates:
      mode: constant
      source:
        xarray-zarr:
          url: cerra_jan2024_boz.zarr
          param:
          - surface_geopotential
          - lsm
          
  - xarray-zarr:
      url: cerra_jan2024_boz.zarr
      param:
      - mcc
      - msl
      - synthetic_windpower
      - t2m
      - wdir10_cos
      - wdir10_sin
      - wdir_cos100
      - wdir_cos150
      - wdir_cos200
      - wdir_cos50
      - wdir_sin100
      - wdir_sin150
      - wdir_sin200
      - wdir_sin50
      - ws10
      - ws100
      - ws150
      - ws200
      - ws50


  # - xarray-zarr:
  #     url: cerra_jan2024_boz.zarr
  #     param:
      - r
      - t 
      - v
      - u
      - z
      # level: 
      # - 500
      # - 600
      # - 700
      # - 750
      # - 800
      # - 850
      # - 900
      # - 950
      # - 1000

      url: cerra_jan2024_boz.zarr
  - forcings:
      param:
      - cos_latitude
      - cos_longitude
      - sin_latitude
      - sin_longitude
      - julian_day
      - insolation
      template: ${input.join.1.xarray-zarr}
name: Cerra-BOZ-Jan2024-3h-v0