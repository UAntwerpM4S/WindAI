build:
  group_by: daily
  variable_naming: param_levelist
dates:
  end: '2025-07-31T21:00:00'
  frequency: 3h
  start: '2020-01-01T00:00:00'
description: Dataset for wind power prediction in the Northsea
input:
  join:
  - repeated-dates:
      mode: constant
      source:
        xarray-zarr:
          param:
          - surface_geopotential
          - lsm

          url: "/mnt/data/weatherloss/WindPower/data/Regular/BOZ_inner.zarr" #remove inner for full dataset 
  - xarray-zarr:
      param:
      - r
      - t
      - u
      - v
      - z
      url: "/mnt/data/weatherloss/WindPower/data/Regular/BOZ_inner.zarr"
      param:
      - mcc
      - msl
      - t2m
      - wdir10_cos
      - wdir10_sin
      - wdir_cos100
      - wdir_cos150
      - wdir_cos200
      - wdir_cos50
      - wdir_sin100
      - wdir_sin150
      - wdir_sin200
      - wdir_sin50
      - ws10
      - ws100
      - ws150
      - ws200
      - ws50
      url: "/mnt/data/weatherloss/WindPower/data/Regular/BOZ_inner.zarr" #remove inner for full dataset 
  - forcings:
      param:
      - cos_latitude
      - cos_longitude
      - sin_latitude
      - sin_longitude
      - julian_day
      - insolation
      template: ${input.join.1.xarray-zarr}
name: Regular-Northsea-3h-inner-v0  #remove inner for full 
